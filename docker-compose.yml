services:
  backend:
    build:
      context: ./backend
    environment:
      BACKEND_DATABASE_URL: sqlite:////data/guessrush.db
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:8080}
      APP_SECRET: ${APP_SECRET:-change-me-compose}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    volumes:
      - backend-data:/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  postgres:
    image: postgres:16-alpine
    profiles: ["postgres"]
    environment:
      POSTGRES_DB: guessrush
      POSTGRES_USER: guessrush
      POSTGRES_PASSWORD: guessrush
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  backend-data:
  postgres-data:
